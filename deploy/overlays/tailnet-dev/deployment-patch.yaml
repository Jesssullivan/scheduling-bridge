# Patch: tailnet-dev resource tuning
#
# Single replica, lower resource limits for dev cluster.
# The blahaj cluster has limited capacity — save headroom
# for other workloads.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduling-bridge
  namespace: scheduling-bridge
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: middleware
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
