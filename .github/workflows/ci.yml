name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  package:
    uses: tinyland-inc/ci-templates/.github/workflows/js-bazel-package.yml@c0ee4a21713eb91cc6fec2670054aab42b1aac22
    with:
      runner_mode: shared
      shared_runner_labels_json: '["tinyland-docker"]'
      workspace_mode: isolated
      publish_mode: same_runner
      node_versions: '["20", "22"]'
      publish_node_version: "22"
      pnpm_version: "9.15.9"
      metadata_check_command: pnpm check:release-metadata
      typecheck_command: pnpm typecheck
      unit_test_command: pnpm test
      build_command: pnpm build
      package_check_command: pnpm check:package
      bazel_targets: "//:pkg"
      package_dir: ./bazel-bin/pkg
      npm_access: public
      github_package_name: "@jesssullivan/scheduling-bridge"
      dry_run: true
    secrets: inherit
