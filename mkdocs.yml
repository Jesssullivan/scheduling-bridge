site_name: scheduling-bridge
site_description: Runtime, packaging, and release docs for @tummycrypt/scheduling-bridge
repo_url: https://github.com/Jesssullivan/acuity-middleware
repo_name: Jesssullivan/acuity-middleware
docs_dir: docs

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: amber

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

nav:
  - Overview: index.md
  - Architecture: architecture.md
  - Runtime Contract: runtime-contract.md
  - Build and Release: build-and-release.md
  - Consumers: consumers.md
  - Generated Repo Facts: generated/repo-facts.md
  - Paper: paper.md
  - Paper Workspace: paper/README.md
  - Phase 1 Data: paper/data/phase1/README.md
